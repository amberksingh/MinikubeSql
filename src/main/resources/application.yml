spring:
  application:
    name: MinikubeSql

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}/${DB_NAME:kubernetesdockersql2025}?useSSL=false&allowPublicKeyRetrieval=true #referred from  app-deployment.yaml
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
